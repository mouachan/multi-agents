---
# =============================================================================
# Global Configuration
# =============================================================================
global:
  # OpenShift cluster domain (replace with your cluster domain)
  clusterDomain: "apps.cluster-xxxxx.xxxxx.sandboxYYYY.opentlc.com"  # Replace with your cluster domain

  # Namespace where all resources will be deployed
  namespace: multi-agents

  # Image registry for custom images
  imageRegistry: quay.io/mouachan/multi-agents

  # Image pull policy
  imagePullPolicy: IfNotPresent

  proxies:
    HTTP_PROXY: ""
    NO_PROXY: .svc,.local,127.0.0.1

inference:
  enabled: false
  # deploy in same-namespace by default
  namespace: ""
  model:
    pvc:
      size: 100Gi
      storageClass: ""
    source: oci
    address: registry.redhat.io/rhelai1/modelcar-llama-3-3-70b-instruct-quantized-w8a8:1.5
    name: llama-3-3-70b-instruct-quantized-w8a8
  resources:
    limits:
      cpu: "8"
      memory: 16Gi
      nvidia.com/gpu: "4"
    requests:
      cpu: "8"
      memory: 16Gi
      nvidia.com/gpu: "4"
  placement: {}

embedding:
  enabled: false
  # deploy in same-namespace by default
  namespace: ""
  model:
    pvc:
      size: 10Gi
      storageClass: ""
    source: huggingface
    address: google/embeddinggemma-300m
    name: embeddinggemma-300m
  resources:
    limits:
      cpu: "2"
      memory: 8Gi
      nvidia.com/gpu: "1"
    requests:
      cpu: "1"
      memory: 8Gi
      nvidia.com/gpu: "1"
  placement: {}

# =============================================================================
# PostgreSQL Database
# =============================================================================
postgresql:
  enabled: true

  replicas: 1

  # Authentication
  auth:
    username: multi_agent_user
    database: multi_agent_db
    existingSecret: postgresql-secret
    secretKeys:
      userPasswordKey: POSTGRES_PASSWORD
      userNameKey: POSTGRES_USER
      databaseKey: POSTGRES_DATABASE

  # Storage
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

  # Resources
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  # Image
  image:
    repository: docker.io/pgvector/pgvector
    tag: pg15

# =============================================================================
# LlamaStack
# =============================================================================
llamastack:
  enabled: true
  fromRhoai: true  # Use RHOAI LlamaStack service name

  # Route (OpenShift)
  route:
    enabled: true
    host: ""  # Auto-generated if empty
    tls:
      enabled: true  # Enable TLS edge termination

  # LiteMaaS configuration (Model as a Service - no on-cluster GPU)
  litemaas:
    url: "REPLACE_WITH_LITEMAAS_URL"
    embeddingUrl: "REPLACE_WITH_LITEMAAS_EMBEDDING_URL"
    visionUrl: "REPLACE_WITH_LITEMAAS_VISION_URL"
    defaultModel: "litemaas/llama-scout-17b"
    embeddingModel: "litemaas-embedding/nomic-embed-text-v1-5"
    visionModel: "litemaas-vision/Qwen2.5-VL-7B-Instruct"

  # Model configuration (legacy, kept for reference)
  model:
    apiToken: fake

  # Embedding model
  embedding:
    dimension: 768
    providerModelId: "nomic-embed-text-v1-5"

  # Vision model
  vision:
    providerModelId: "Qwen2.5-VL-7B-Instruct"

  # Database configuration (LlamaStack uses separate database)
  database:
    name: llamastack
    user: llamastack

  # Resources
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# =============================================================================
# MCP Servers
# =============================================================================
mcp:
  # OCR Server
  ocr:
    enabled: true
    replicas: 1

    image:
      repository: ocr-server
      tag: v1.0

    service:
      type: ClusterIP
      port: 8080

    # Environment variables
    env:
      OCR_LANGUAGES: "en,fr"
      OCR_GPU_ENABLED: "false"
      LOG_LEVEL: "INFO"

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    placement: {}

  # RAG Server
  rag:
    enabled: true
    replicas: 1

    image:
      repository: rag-server
      tag: v1.1

    service:
      type: ClusterIP
      port: 8080

    # Environment variables
    env:
      LOG_LEVEL: "INFO"

    resources:
      requests:
        cpu: 1000m
        memory: 6Gi
      limits:
        cpu: 2000m
        memory: 6Gi

  # Claims Server
  claims:
    enabled: true
    replicas: 1

    image:
      repository: claims-server
      tag: v1.0

    service:
      type: ClusterIP
      port: 8080

    env:
      LOG_LEVEL: "INFO"

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

  # Tenders Server
  tenders:
    enabled: true
    replicas: 1

    image:
      repository: tenders-server
      tag: v1.0

    service:
      type: ClusterIP
      port: 8080

    env:
      LOG_LEVEL: "INFO"

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

# =============================================================================
# Backend API
# =============================================================================
backend:
  enabled: true

  replicas: 1

  # Image
  image:
    repository: backend
    tag: v2.1

  # Service
  service:
    type: ClusterIP
    port: 8000

  # Route (OpenShift)
  route:
    enabled: true
    host: ""  # Auto-generated if empty
    tls:
      enabled: true  # Enable TLS edge termination

  pvc:
    accessMode: ReadWriteOnce
    initPvc: false
    size: 5Gi
    storageClass: ""

  # Environment variables
  env:
    APP_NAME: "Claims Processing Demo"
    ENVIRONMENT: "production"
    DEBUG: "false"
    LOG_LEVEL: "INFO"

  # Admin & Database Reset
  seedDataUrl: "https://raw.githubusercontent.com/mouachan/multi-agents/main/database/seed_data/001_seed_data.sql"

  # Resources
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# =============================================================================
# Frontend
# =============================================================================
frontend:
  enabled: true

  # Deployment
  replicas: 2

  # Image
  image:
    repository: frontend
    tag: v2.3

  # Service
  service:
    type: ClusterIP
    port: 8080

  # Route (OpenShift)
  route:
    enabled: true
    host: ""  # Auto-generated if empty
    tls:
      enabled: true  # Enable TLS edge termination

  # Resources
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

hfcli:
  image:
    repository: hfcli
    tag: v1.0
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "1200m"
      memory: 4Gi
  token: hf_<your-token>

# =============================================================================
# Secrets
# =============================================================================
secrets:
  # PostgreSQL password
  postgresPassword: "REPLACE_WITH_PASSWORD"
  postgresAdminPassword: "REPLACE_WITH_ADMIN_PASSWORD"

  # LiteMaaS API keys
  litemaasApiKey: "REPLACE_WITH_KEY"
  litemaasEmbeddingApiKey: "REPLACE_WITH_KEY"
  litemaasVisionApiKey: "REPLACE_WITH_KEY"

  # Create secrets automatically
  create: true

# =============================================================================
# MinIO (S3-compatible object storage)
# =============================================================================
minio:
  enabled: true

  # Image configuration
  image:
    repository: quay.io/minio/minio
    tag: latest

  # Root credentials
  rootUser: "admin"
  rootPassword: "REPLACE_WITH_MINIO_PASSWORD"

  # Service configuration
  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001

  # Route configuration
  route:
    api:
      enabled: true
      host: ""
      tls:
        enabled: true
    console:
      enabled: true
      host: ""
      tls:
        enabled: true

  # Document storage buckets (S3-compatible, used by LlamaStack Files API)
  documentBuckets:
    claims: claims
    tenders: tenders

  # Persistence
  persistence:
    enabled: true
    size: 20Gi
    accessMode: ReadWriteOnce
    storageClass: ""

  # Resources
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# =============================================================================
# Data Initialization (post-install job)
# =============================================================================
dataInit:
  enabled: true
  image:
    repository: data-init
    tag: v1.0
  documentsArchiveUrl: "https://github.com/mouachan/multi-agents/archive/refs/heads/main.tar.gz"
  forceReinit: "false"
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# Data Science Pipelines (RHOAI DSPA)
# =============================================================================
dataSciencePipelines:
  enabled: false  # Disabled by default - requires RHOAI with DSP operator

  dspVersion: v2

  apiServer:
    enableSamplePipeline: false
    enableOauth: true
    cacheEnabled: true
    pipelineStore: kubernetes

  database:
    mariaDB:
      pipelineDBName: mlpipeline
      username: mlpipeline
      pvcSize: 10Gi

  objectStorage:
    useInternalMinio: true
    bucket: pipelines
    region: us-east-1
    scheme: http
    s3CredentialsSecret:
      accessKey: AWS_ACCESS_KEY_ID
      secretKey: AWS_SECRET_ACCESS_KEY

# =============================================================================
# Guardrails (TrustyAI)
# =============================================================================
guardrails:
  enabled: true  # Enable PII detection with TrustyAI guardrails

  name: claims-guardrails
  configMapName: claims-guardrails-config

  # GuardrailsOrchestrator configuration
  enableBuiltInDetectors: true
  enableGuardrailsGateway: false
  replicas: 1
  logLevel: "info"

  tls:
    enabled: false

  # Chat generation service (LlamaStack)
  chatGeneration:
    hostname: llamastack-rhoai-service  # Resolved within same namespace
    port: 8321

  # Detector configurations for ConfigMap
  detectors:
    regex:
      threshold: 0.5
    hap:
      threshold: 0.5
    pii:
      threshold: 0.7

    # Llama Guard 3 1B detector InferenceService
    llamaGuard:
      enabled: false  # Requires GPU, enable only if GPU available
      minReplicas: 1
      maxReplicas: 1
      storageUri: "oci://quay.io/rh-aiservices-bu/llama-guard-3-1b-modelcar:2.0.0"
      resources:
        requests:
          cpu: "1"
          memory: 8Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "8"
          memory: 10Gi
          nvidia.com/gpu: "1"
      tolerations:
        - effect: NoSchedule
          operator: Exists
      placement: {}

# =============================================================================
# GPT-OSS 120B (llm-d / LLMInferenceService)
# =============================================================================
gptoss:
  enabled: false
  namespace: gpt-oss-120b
  name: gpt-oss-120b

  model:
    source: huggingface
    address: RedHatAI/gpt-oss-120b
    name: gpt-oss-120b
    pvc:
      size: 100Gi
      storageClass: ""

  replicas: 1

  parallelism:
    tensor: 4

  vllm:
    maxModelLen: "16384"
    gpuMemoryUtilization: "0.95"
    kvCacheDtype: fp8
    toolCallParser: hermes

  resources:
    limits:
      cpu: "32"
      memory: 128Gi
    requests:
      cpu: "8"
      memory: 32Gi

  router:
    route: {}
    gateway: {}
    scheduler: {}
