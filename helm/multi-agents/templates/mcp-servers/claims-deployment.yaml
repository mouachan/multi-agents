{{- if .Values.mcp.claims.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  name: claims-server
  namespace: {{ include "multi-agents.namespace" . }}
  labels:
    {{- include "multi-agents.labels" . | nindent 4 }}
    app: claims-server
    component: mcp-server
spec:
  replicas: {{ .Values.mcp.claims.replicas }}
  selector:
    matchLabels:
      app: claims-server
  template:
    metadata:
      labels:
        app: claims-server
        component: mcp-server
    spec:
      containers:
      - name: claims-server
        image: {{ include "multi-agents.imageRegistry" . }}/{{ .Values.mcp.claims.image.repository }}:{{ .Values.mcp.claims.image.tag }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        {{- include "postgres.env" . | nindent 8 }}
        - name: LLAMASTACK_ENDPOINT
          value: {{ quote (include "llamastack.endpoint" .) }}
        - name: LLAMASTACK_DEFAULT_MODEL
          value: {{ .Values.llamastack.litemaas.defaultModel | quote }}
        - name: EMBEDDING_MODEL
          value: {{ .Values.llamastack.litemaas.embeddingModel | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.mcp.claims.env.LOG_LEVEL | quote }}
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          {{- toYaml .Values.mcp.claims.resources | nindent 10 }}
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 10
{{- end }}
