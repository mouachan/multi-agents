{{- if .Values.dataInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "multi-agents.fullname" . }}-data-init
  labels:
    {{- include "multi-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "25"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.dataInit.backoffLimit | default 3 }}
  ttlSecondsAfterFinished: {{ .Values.dataInit.ttlSecondsAfterFinished | default 3600 }}
  template:
    metadata:
      labels:
        {{- include "multi-agents.labels" . | nindent 8 }}
        app.kubernetes.io/component: data-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: data-init
          image: {{ include "multi-agents.imageRegistry" . }}/{{ .Values.dataInit.image.repository }}:{{ .Values.dataInit.image.tag }}
          env:
            - name: LLAMASTACK_ENDPOINT
              value: {{ quote (include "llamastack.endpoint" .) }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.llamastack.litemaas.embeddingModel | quote }}
            - name: OCR_SERVER_URL
              value: "http://ocr-server.{{ include "multi-agents.namespace" . }}.svc.cluster.local:8080"
            - name: CLAIMS_SERVER_URL
              value: "http://claims-server.{{ include "multi-agents.namespace" . }}.svc.cluster.local:8080"
            - name: TENDERS_SERVER_URL
              value: "http://tenders-server.{{ include "multi-agents.namespace" . }}.svc.cluster.local:8080"
            - name: DOCUMENTS_ARCHIVE_URL
              value: {{ .Values.dataInit.documentsArchiveUrl | quote }}
            - name: FORCE_REINIT
              value: {{ .Values.dataInit.forceReinit | default "false" | quote }}
            {{- include "postgres.env" . | nindent 12 }}
          resources:
            requests:
              cpu: {{ .Values.dataInit.resources.requests.cpu | default "200m" }}
              memory: {{ .Values.dataInit.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ .Values.dataInit.resources.limits.cpu | default "500m" }}
              memory: {{ .Values.dataInit.resources.limits.memory | default "512Mi" }}
{{- end }}
