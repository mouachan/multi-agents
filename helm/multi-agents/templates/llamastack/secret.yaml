{{- if .Values.llamastack.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: litemaas-secret
  namespace: {{ include "multi-agents.namespace" . }}
  labels:
    {{- include "multi-agents.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  LITEMAAS_API_KEY: {{ .Values.secrets.litemaasApiKey | quote }}
  LITEMAAS_EMBEDDING_API_KEY: {{ .Values.secrets.litemaasEmbeddingApiKey | quote }}
  LITEMAAS_VISION_API_KEY: {{ .Values.secrets.litemaasVisionApiKey | quote }}
{{- end }}
