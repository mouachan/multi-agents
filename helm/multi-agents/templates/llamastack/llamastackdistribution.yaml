{{- if and .Values.llamastack.enabled }}
---
apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  annotations:
    # ArgoCD GitOps
    argocd.argoproj.io/sync-wave: "10"
    # Helm hooks
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "multi-agents.labels" . | nindent 4 }}
  name: llamastack-rhoai
  namespace: {{ include "multi-agents.namespace" . }}
spec:
  replicas: 1
  server:
    containerSpec:
      env:
        # LiteMaaS LLM configuration
        - name: LITEMAAS_URL
          value: {{ .Values.llamastack.litemaas.url | quote }}
        - name: LITEMAAS_API_KEY
          valueFrom:
            secretKeyRef:
              name: litemaas-secret
              key: LITEMAAS_API_KEY

        # LiteMaaS Embedding configuration
        - name: LITEMAAS_EMBEDDING_URL
          value: {{ .Values.llamastack.litemaas.embeddingUrl | quote }}
        - name: LITEMAAS_EMBEDDING_API_KEY
          valueFrom:
            secretKeyRef:
              name: litemaas-secret
              key: LITEMAAS_EMBEDDING_API_KEY

        # LiteMaaS Vision configuration
        - name: LITEMAAS_VISION_URL
          value: {{ .Values.llamastack.litemaas.visionUrl | quote }}
        - name: LITEMAAS_VISION_API_KEY
          valueFrom:
            secretKeyRef:
              name: litemaas-secret
              key: LITEMAAS_VISION_API_KEY

        # PostgreSQL and PGVector configuration
        - name: POSTGRES_HOST
          value: postgresql.{{ include "multi-agents.namespace" . }}.svc.cluster.local
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.auth.existingSecret }}
              key: LLAMASTACK_DATABASE
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.auth.existingSecret }}
              key: LLAMASTACK_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.auth.existingSecret }}
              key: LLAMASTACK_PASSWORD
        - name: ENABLE_PGVECTOR
          value: "true"
{{- if .Values.minio.enabled }}
        # MinIO S3 credentials for Files API
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "multi-agents.fullname" . }}-minio-credentials
              key: MINIO_ROOT_USER
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "multi-agents.fullname" . }}-minio-credentials
              key: MINIO_ROOT_PASSWORD
{{- end }}
{{- if .Values.guardrails.enabled }}
        - name: FMS_ORCHESTRATOR_URL
          value: "https://guardrails-orchestrator-service.{{ include "multi-agents.namespace" . }}.svc.cluster.local:8032"
{{- end }}
      name: llama-stack
      port: 8321
      resources:
        {{- toYaml .Values.llamastack.resources | nindent 8 }}
    distribution:
      name: rh-dev
    userConfig:
      configMapName: llamastack-rhoai
    storage:
      size: 20Gi
      mountPath: /opt/app-root/src/.llama/distributions/rh/
{{- end }}
