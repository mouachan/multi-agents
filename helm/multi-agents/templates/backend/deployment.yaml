{{- if .Values.backend.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4" # after llamastackdistribution
  name: backend
  namespace: {{ include "multi-agents.namespace" . }}
  labels:
    {{- include "multi-agents.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.backend.replicas | default 1 }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: {{ include "multi-agents.imageRegistry" . }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            {{- include "postgres.env" . | nindent 12 }}
{{- if .Values.minio.enabled }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "multi-agents.fullname" . }}-minio-credentials
                  key: MINIO_ROOT_USER
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "multi-agents.fullname" . }}-minio-credentials
                  key: MINIO_ROOT_PASSWORD
{{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - mountPath: /app/prompts
              name: prompts
              readOnly: true
            - mountPath: /app/prompts-ao
              name: ao-prompts
              readOnly: true
            - mountPath: /app/prompts-orchestrator
              name: orchestrator-prompts
              readOnly: true
      volumes:
        - name: prompts
          configMap:
            name: claims-prompts
        - name: ao-prompts
          configMap:
            name: ao-prompts
        - name: orchestrator-prompts
          configMap:
            name: orchestrator-prompts
{{- end }}
