version: 2
image_name: rh-dev

apis:
- agents
- datasetio
- files
- inference
- safety
- eval
- scoring
- tool_runtime
- vector_io

providers:
  inference:
  # LiteMaaS LLM (Llama-4-Scout, DeepSeek, etc.)
  - provider_id: litemaas
    provider_type: remote::vllm
    config:
      url: ${env.LITEMAAS_URL:=https://your-llm-endpoint.example.com/v1}
      max_tokens: 4096
      api_token: ${env.LITEMAAS_API_KEY:=sk-change-me}
      tls_verify: false
  # LiteMaaS Vision (Qwen2.5-VL for OCR)
  - provider_id: litemaas-vision
    provider_type: remote::vllm
    config:
      url: ${env.LITEMAAS_VISION_URL:=https://your-vision-endpoint.example.com/v1}
      max_tokens: 2048
      api_token: ${env.LITEMAAS_VISION_API_KEY:=sk-change-me}
      tls_verify: false
  # LiteMaaS Embedding
  - provider_id: litemaas-embedding
    provider_type: remote::vllm
    config:
      url: ${env.LITEMAAS_EMBEDDING_URL:=https://your-embedding-endpoint.example.com/v1}
      max_tokens: 512
      api_token: ${env.LITEMAAS_EMBEDDING_API_KEY:=sk-change-me}
      tls_verify: false

  vector_io:
  - provider_id: pgvector
    provider_type: remote::pgvector
    config:
      host: postgresql
      port: 5432
      db: multi_agent_db
      user: multi_agent_user
      password: multi_agents_pass
      persistence:
        backend: kv_default
        namespace: vector_io::pgvector

  safety:
  - provider_id: llama-guard
    provider_type: inline::llama-guard
    config:
      excluded_categories: []

  agents:
  - provider_id: meta-reference
    provider_type: inline::meta-reference
    config:
      persistence:
        agent_state:
          backend: kv_default
          namespace: agents::meta_reference
        responses:
          backend: sql_default
          table_name: agents_responses
          max_write_queue_size: 10000
          num_writers: 4

  eval:
  - provider_id: meta-reference-eval
    provider_type: inline::meta-reference
    config:
      kvstore:
        backend: kv_default
        namespace: eval

  datasetio:
  - provider_id: huggingface
    provider_type: remote::huggingface
    config:
      kvstore:
        backend: kv_default
        namespace: datasetio::huggingface

  scoring:
  - provider_id: basic
    provider_type: inline::basic
    config: {}
  - provider_id: llm-as-judge
    provider_type: inline::llm-as-judge
    config: {}

  tool_runtime:
  - provider_id: rag-runtime
    provider_type: inline::rag-runtime
    config: {}
  - provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
    config: {}

  files:
  - provider_id: meta-reference-files
    provider_type: inline::localfs
    config:
      storage_dir: /data/files
      metadata_store:
        backend: sql_default
        table_name: files_metadata

  batches:
  - provider_id: reference
    provider_type: inline::reference
    config:
      kvstore:
        namespace: batches
        backend: kv_default

storage:
  backends:
    kv_default:
      type: kv_postgres
      host: ${env.POSTGRES_HOST:=postgresql}
      port: ${env.POSTGRES_PORT:=5432}
      db: ${env.POSTGRES_DB:=multi_agent_db}
      user: ${env.POSTGRES_USER:=multi_agent_user}
      password: ${env.POSTGRES_PASSWORD:=multi_agents_pass}
      table_name: llamastack_kvstore
    sql_default:
      type: sql_postgres
      host: ${env.POSTGRES_HOST:=postgresql}
      port: ${env.POSTGRES_PORT:=5432}
      db: ${env.POSTGRES_DB:=multi_agent_db}
      user: ${env.POSTGRES_USER:=multi_agent_user}
      password: ${env.POSTGRES_PASSWORD:=multi_agents_pass}
  stores:
    metadata:
      backend: kv_default
      namespace: registry
    inference:
      table_name: inference_store
      backend: sql_default
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      namespace: prompts
      backend: kv_default

registered_resources:
  models:
  # LLM — Llama 4 Scout 17B (default model for all agents)
  - metadata: {}
    model_id: llama-scout-17b
    provider_id: litemaas
    provider_model_id: llama-scout-17b
    model_type: llm
  # LLM — DeepSeek R1 Distill Qwen 14B (cheaper, for courrier_info/courrier_suivi)
  - metadata: {}
    model_id: deepseek-r1-distill-qwen-14b
    provider_id: litemaas
    provider_model_id: deepseek-r1-distill-qwen-14b
    model_type: llm
  # Vision — Qwen2.5-VL-7B (OCR)
  - metadata: {}
    model_id: Qwen2.5-VL-7B-Instruct
    provider_id: litemaas-vision
    provider_model_id: Qwen2.5-VL-7B-Instruct
    model_type: llm
  # Embeddings — Nomic Embed Text v1.5 (768-dim)
  - metadata:
      embedding_dimension: 768
    model_id: nomic-embed-text-v1-5
    provider_id: litemaas-embedding
    provider_model_id: nomic-embed-text-v1-5
    model_type: embedding

  shields: []
  vector_dbs: []
  datasets: []
  scoring_fns: []
  benchmarks: []

  tool_groups:
  - toolgroup_id: mcp::ocr-server
    provider_id: model-context-protocol
    mcp_endpoint:
      uri: http://ocr-server:8080/sse
  - toolgroup_id: mcp::rag-server
    provider_id: model-context-protocol
    mcp_endpoint:
      uri: http://rag-server:8080/sse
  - toolgroup_id: mcp::claims-server
    provider_id: model-context-protocol
    mcp_endpoint:
      uri: http://claims-server:8080/sse
  - toolgroup_id: mcp::tenders-server
    provider_id: model-context-protocol
    mcp_endpoint:
      uri: http://tenders-server:8080/sse
  - toolgroup_id: mcp::postal-server
    provider_id: model-context-protocol
    mcp_endpoint:
      uri: http://postal-server:8080/sse
  - toolgroup_id: mcp::tracking-server
    provider_id: model-context-protocol
    mcp_endpoint:
      uri: http://tracking-server:8080/sse
  - toolgroup_id: builtin::rag
    provider_id: rag-runtime

telemetry:
  enabled: true

server:
  port: 8321
